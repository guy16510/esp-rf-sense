name: fix-slot-fallback

on:
  push:
    branches: [position-ready]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: position-ready
      - name: Preserve unmatched discovered receivers
        run: |
          python - <<'PY'
          from pathlib import Path

          core = Path('apps/dashboard/public/four-node-dashboard-core.js')
          text = core.read_text()
          old = """      const free = slots.findIndex((_node, index) => !slots[index] && !explicitIds[index]);
                if (free >= 0) slots[free] = node;
          """
          new = """      const free = slots.findIndex((candidate) => !candidate);
                if (free >= 0) {
                  slots[free] = node;
                  assigned.add(id);
                }
          """
          if old not in text:
              raise SystemExit('core slot fallback block not found')
          core.write_text(text.replace(old, new, 1))

          room = Path('apps/dashboard/public/room-d3.js')
          text = room.read_text()
          old = """    for (const node of nodes) {
                const index = explicitIds.indexOf(String(node.deviceId || '').toLowerCase());
                if (index >= 0 && slots[index]) assigned.set(slots[index], node);
              }
              return assigned;
          """
          new = """    const matched = new Set();
              for (const node of nodes) {
                const id = String(node.deviceId || '').toLowerCase();
                const index = explicitIds.indexOf(id);
                if (index >= 0 && slots[index]) {
                  assigned.set(slots[index], node);
                  matched.add(id);
                }
              }
              for (const node of nodes) {
                const id = String(node.deviceId || '').toLowerCase();
                if (matched.has(id)) continue;
                const free = slots.find((slot) => !assigned.get(slot));
                if (free) {
                  assigned.set(free, node);
                  matched.add(id);
                }
              }
              return assigned;
          """
          if old not in text:
              raise SystemExit('room slot fallback block not found')
          room.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add apps/dashboard/public/four-node-dashboard-core.js apps/dashboard/public/room-d3.js
          git commit -m "Show discovered receivers when configured IDs do not match"
          git push origin HEAD:position-ready
