name: dashboard-e2e

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-e2e:
    name: four-node dashboard browser e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install browser test dependencies
        run: npm install --no-save @playwright/test@1.61.0 d3@7.9.0

      - name: Build Node services
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start dashboard and UDP simulator
        run: |
          mkdir -p apps/dashboard/e2e/artifacts
          node apps/dashboard/dist/four-node-cli.js \
            --http-host 127.0.0.1 \
            --http-port 8080 \
            --udp-host 127.0.0.1 \
            --udp-port 5566 \
            --interval-ms 100 \
            > apps/dashboard/e2e/artifacts/dashboard.log 2>&1 &
          echo $! > apps/dashboard/e2e/artifacts/dashboard.pid
          node apps/dashboard/e2e/simulator.mjs \
            > apps/dashboard/e2e/artifacts/simulator.log 2>&1 &
          echo $! > apps/dashboard/e2e/artifacts/simulator.pid
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8080/api/nodes > /dev/null; then
              exit 0
            fi
            sleep 0.25
          done
          cat apps/dashboard/e2e/artifacts/dashboard.log
          exit 1

      - name: Run Playwright end-to-end tests
        env:
          RF_DASHBOARD_URL: http://127.0.0.1:8080
        run: npx playwright test --config apps/dashboard/e2e/playwright.config.mjs

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-e2e-artifacts
          path: apps/dashboard/e2e/artifacts
          if-no-files-found: ignore
          retention-days: 14
