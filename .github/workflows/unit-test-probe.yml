name: unit-test-probe

on:
  pull_request:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Run focused test probe
        run: |
          git clone --quiet --branch position-ready https://github.com/guy16510/esp-rf-sense.git repo
          cd repo
          npm ci --silent
          npm test
