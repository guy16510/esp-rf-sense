name: fix-room-import

on:
  push:
    branches: [position-ready]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: position-ready
      - name: Use required room import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/dashboard/public/four-node-dashboard.js')
          text = path.read_text()
          old = "import './four-node-dashboard-core.js';\n\nvoid import('./room-d3.js').catch((error) => {\n  console.error('[position-ui] room visualization failed to load', error);\n});\n"
          new = "import './four-node-dashboard-core.js';\nimport './room-d3.js';\n"
          if old not in text:
              raise SystemExit('dynamic room import not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add apps/dashboard/public/four-node-dashboard.js
          git commit -m "Load room visualization as required UI dependency"
          git push origin HEAD:position-ready
