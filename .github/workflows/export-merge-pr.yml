name: Export merge PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -qr source-checkout.zip . -x '.git/*'
      - uses: actions/upload-artifact@v4
        with:
          name: merge-source-checkout
          path: source-checkout.zip
          retention-days: 1
