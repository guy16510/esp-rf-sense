name: tools-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tools:
    name: node tools and dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install
        run: npm ci
      - name: Format
        run: npx prettier --check "tools/**/src/**/*.ts" "*.json"
      - name: Lint
        run: npm run lint
      - name: Typecheck
        shell: bash
        run: set -o pipefail && npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
      - name: Packet alignment tests
        run: npx vitest run apps/dashboard/src/protocol-v2.test.ts apps/dashboard/src/joint-packet-aligner.test.ts
      - name: XY localization test
        run: npx vitest run apps/dashboard/src/simulated-xy-pipeline.test.ts
      - name: Unit tests
        run: npm test
      - name: Build all workspaces
        run: npm run build

  python-analysis:
    name: python analysis (3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/analysis
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install analysis package with dev extras
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check . --extend-per-file-ignores "rfsense_analysis/dashboard.py:F401"
      - name: Pytest
        run: pytest -q
