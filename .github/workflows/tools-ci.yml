name: tools-ci

# Lints, type-checks, and tests the host-side tooling: the TypeScript workspaces
# (collector, ota-server, cli, experiments, dashboard) on the pinned Node LTS, and the Python
# analysis package on 3.12. No firmware or ESP-IDF is involved here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tools:
    name: node tools and dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (clean, lockfile-pinned)
        run: npm ci

      - name: Format established workspaces
        run: npx prettier --check "tools/**/src/**/*.ts" "*.json"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build all workspaces
        run: npm run build

  python-analysis:
    name: python analysis (3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/analysis
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analysis package with dev extras
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check . --extend-per-file-ignores "rfsense_analysis/dashboard.py:F401"

      - name: Pytest
        run: pytest -q
