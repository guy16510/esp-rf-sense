name: promote-position-ready

on:
  push:
    branches: [position-ready]

permissions:
  contents: write

jobs:
  promote:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: position-ready
          fetch-depth: 0
      - name: Fast-forward validated branch to main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD
          rm .github/workflows/promote-position-ready.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .github/workflows/promote-position-ready.yml
          git commit -m "Remove one-time promotion workflow"
          git push origin HEAD:position-ready
          git push origin HEAD:main
