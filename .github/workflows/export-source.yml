name: Export source checkout

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive checkout
        run: zip -qr source-checkout.zip . -x '.git/*'
      - uses: actions/upload-artifact@v4
        with:
          name: source-checkout
          path: source-checkout.zip
          if-no-files-found: error
          retention-days: 1
