name: e2e-state-probe

on:
  pull_request:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Inspect live node card state
        shell: bash
        run: |
          git clone --quiet --branch position-ready https://github.com/guy16510/esp-rf-sense.git repo
          cd repo
          npm ci --silent
          npm install --silent --no-save @playwright/test@1.61.0 d3@7.9.0
          npm run build --silent
          npx playwright install chromium >/dev/null 2>&1
          node apps/dashboard/dist/four-node-cli.js --http-host 127.0.0.1 --http-port 8080 --udp-host 127.0.0.1 --udp-port 5566 --interval-ms 100 >/tmp/dashboard.log 2>&1 &
          node apps/dashboard/e2e/simulator.mjs >/tmp/simulator.log 2>&1 &
          for attempt in $(seq 1 40); do
            curl --fail --silent http://127.0.0.1:8080/api/nodes >/dev/null && break
            sleep 0.25
          done
          node --input-type=module <<'NODE'
          import { chromium } from '@playwright/test';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage();
          page.on('pageerror', (error) => console.log('PAGE_ERROR', error.message));
          await page.goto('http://127.0.0.1:8080', { waitUntil: 'domcontentloaded' });
          await page.waitForTimeout(4000);
          console.log('CARD_CLASSES', await page.locator('.node-card').evaluateAll((cards) => cards.map((card) => card.className)));
          console.log('CARD_STATES', await page.locator('.node-state').allTextContents());
          console.log('FLEET', await page.locator('#fleetStatus').textContent());
          console.log('API', await page.evaluate(async () => (await fetch('/api/nodes')).json()).then((value) => value.nodes.map((node) => ({ id: node.deviceId, ready: node.ready, age: node.ageSec, state: node.state, reasons: node.readinessReasons }))));
          await browser.close();
          NODE
