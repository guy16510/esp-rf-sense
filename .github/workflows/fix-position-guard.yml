name: fix-position-guard

on:
  push:
    branches: [position-ready]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: position-ready
      - name: Patch null guard
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/dashboard/src/dashboard-model-trainer.ts')
          text = path.read_text()
          text = text.replace('existing?.x !== null &&\n    existing?.y !== null &&', 'existing !== undefined &&\n    existing.x !== null &&\n    existing.y !== null &&', 1)
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add apps/dashboard/src/dashboard-model-trainer.ts
          git commit -m "Fix position trainer null guard"
          git push origin HEAD:position-ready
